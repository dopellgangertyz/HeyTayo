    <style>
        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body {
            min-height:100vh;
            padding:24px 14px;
            font-family:Arial,Helvetica,sans-serif;
            color:#fff;
            background:
                radial-gradient(
                    circle at top,
                    rgba(255,0,0,.18),
                    transparent 38%
                ),
                #050505;
        }

        .page {
            width:100%;
            max-width:920px;
            margin:0 auto;
        }

        .topbar {
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:16px;
            margin-bottom:28px;
        }

        .brand {
            color:#ff3030;
            text-decoration:none;
            font-size:24px;
            font-weight:900;
            letter-spacing:1px;
            text-shadow:0 0 14px rgba(255,0,0,.65);
        }

        .back {
            padding:10px 16px;
            border:1px solid rgba(255,45,45,.7);
            border-radius:12px;
            color:#fff;
            text-decoration:none;
            background:#140000;
        }

        .provider-section {
            padding:30px 20px;
            border:1px solid rgba(255,35,35,.65);
            border-radius:24px;
            background:
                linear-gradient(
                    145deg,
                    rgba(25,0,0,.94),
                    rgba(4,4,4,.97)
                );
            box-shadow:
                0 0 18px rgba(255,0,0,.3),
                0 0 42px rgba(255,0,0,.14);
        }

        .section-head {
            margin-bottom:26px;
            text-align:center;
        }

        .section-head span {
            display:block;
            margin-bottom:8px;
            color:#ffd84a;
            font-size:12px;
            font-weight:800;
            letter-spacing:2px;
        }

        .section-head h1 {
            margin-bottom:10px;
            font-size:36px;
            color:#fff;
        }

        .section-head p {
            max-width:580px;
            margin:0 auto;
            color:#cfcfcf;
            font-size:14px;
            line-height:1.7;
        }

        .provider-grid {
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:14px;
        }

        .provider-item {
            min-height:108px;
            padding:18px 12px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            text-align:center;

            border:1px solid rgba(255,45,45,.55);
            border-radius:16px;

            color:#fff;
            text-decoration:none;

            background:
                linear-gradient(
                    180deg,
                    rgba(255,255,255,.04),
                    rgba(255,0,0,.035)
                );

            box-shadow:
                inset 0 0 16px rgba(255,0,0,.08);

            transition:
                transform .2s ease,
                box-shadow .2s ease,
                border-color .2s ease;
        }

        .provider-item:hover {
            transform:translateY(-4px);
            border-color:#ff3b3b;
            box-shadow:
                0 0 15px rgba(255,0,0,.3),
                inset 0 0 16px rgba(255,0,0,.1);
        }

        .provider-item strong {
            margin-bottom:7px;
            font-size:16px;
        }

        .provider-item span {
            color:#ffd84a;
            font-size:11px;
            letter-spacing:1.5px;
        }

        footer {
            padding:24px 10px 6px;
            text-align:center;
            color:#999;
            font-size:12px;
        }

        @media (max-width:760px) {
            .provider-grid {
                grid-template-columns:repeat(2,1fr);
            }

            .section-head h1 {
                font-size:30px;
            }
        }

        @media (max-width:420px) {
            body {
                padding:12px 8px;
            }

            .provider-section {
                padding:24px 12px;
                border-radius:18px;
            }

            .provider-grid {
                gap:10px;
            }

            .provider-item {
                min-height:94px;
                padding:14px 8px;
            }

            .provider-item strong {
                font-size:14px;
            }
        }
